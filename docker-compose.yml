version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: investr-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: investment_manager
      POSTGRES_USER: investr
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U investr -d investment_manager"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: investr-api
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql+asyncpg://investr:${DB_PASSWORD:-changeme}@db:5432/investment_manager"
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
      CORS_ORIGINS: "http://localhost:3000"
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: investr-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000/api/v1"
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
